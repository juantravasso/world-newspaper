<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="900"
  viewBox="0 0 1600 900"
  role="img"
  aria-label="ECONOMIA"
>
  <defs>
    <linearGradient
      id="background"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0"
        stop-color="#0f1b33"
      />
      <stop
        offset="1"
        stop-color="#16845b"
      />
    </linearGradient>

    <radialGradient
      id="light"
      cx="75%"
      cy="20%"
      r="70%"
    >
      <stop
        offset="0"
        stop-color="#ffffff"
        stop-opacity="0.25"
      />
      <stop
        offset="1"
        stop-color="#ffffff"
        stop-opacity="0"
      />
    </radialGradient>
  </defs>

  <rect
    width="1600"
    height="900"
    fill="url(#background)"
  />

  <rect
    width="1600"
    height="900"
    fill="url(#light)"
  />

  <circle
    cx="1320"
    cy="190"
    r="260"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.12"
    stroke-width="3"
  />

  <circle
    cx="1320"
    cy="190"
    r="180"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.1"
    stroke-width="3"
  />

  <text
    x="100"
    y="650"
    fill="#ffffff"
    font-family="Arial, Helvetica, sans-serif"
    font-size="82"
    font-weight="700"
    letter-spacing="8"
  >
    ECONOMIA
  </text>

  <text
    x="100"
    y="770"
    fill="#ffffff"
    fill-opacity="0.72"
    font-family="Arial, Helvetica, sans-serif"
    font-size="36"
    font-weight="500"
  >
    WORLD NEWSPAPER
  </text>

  <text
    x="1240"
    y="300"
    fill="#ffffff"
    fill-opacity="0.9"
    font-family="Arial, Helvetica, sans-serif"
    font-size="150"
    font-weight="700"
    text-anchor="middle"
  >
    ↗
  </text>
</svg>
